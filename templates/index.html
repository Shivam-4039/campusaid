<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusAid 🎓</title>
    <link rel="stylesheet" href="/static/design-system.css">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* ═══════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════ */

        .sidebar {
            width: 280px;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e293b;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #1e293b;
        }

        .new-chat-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .new-chat-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-list::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: #334155;
        }

        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 2px;
            font-size: 13px;
            color: #cbd5e1;
            transition: all var(--transition-fast);
        }

        .chat-item:hover {
            background: #1e293b;
            color: white;
        }

        .chat-item.active {
            background: #1e293b;
            color: white;
        }

        .chat-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity var(--transition-fast);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .chat-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            color: #64748b;
            text-align: center;
            padding: 30px 20px;
            font-size: 13px;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: var(--radius-md);
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .theme-toggle:hover {
            background: #1e293b;
            border-color: #475569;
        }

        .version-text {
            font-size: 10px;
            color: #64748b;
            text-align: center;
            letter-spacing: 0.4px;
        }

        /* ═══════════════════════════════════════════
       MAIN CHAT AREA
       ═══════════════════════════════════════════ */

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
        }

        .chat-header {
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        /* Upload area */


        .upload-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .remove-doc:hover {
            background: var(--danger-light);
        }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            line-height: 1.55;
            white-space: pre-wrap;
            animation: fadeInUp 0.3s ease-out;
            font-size: 14px;
        }

        .message.user {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: var(--bg-subtle);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 4px;
            padding: 0 8px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typing dots */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--text-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }


        /* Welcome state */
        .welcome-state {
            text-align: center;
            padding: 48px 20px 24px;
        }

        .welcome-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Suggestions */
        .suggestions-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
        }

        .suggestions-title {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            font-weight: 500;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 620px;
            margin: 0 auto;
            width: 100%;
        }

        .suggestion-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            transition: all var(--transition-fast);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .suggestion-card:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .suggestion-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        .suggestion-text {
            flex: 1;
            line-height: 1.4;
        }

        /* ═══════════════════════════════════════════
   DOC ATTACHMENT CHIP
   ═══════════════════════════════════════════ */

        .doc-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--primary-light);
            border: 1px solid var(--primary);
            border-radius: var(--radius-md);
            margin: 0 24px 8px;
            font-size: 13px;
            color: var(--text-primary);
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .doc-chip-icon {
            font-size: 16px;
        }

        .doc-chip-name {
            flex: 1;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--primary);
        }

        .doc-chip-remove {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all var(--transition-fast);
            line-height: 1;
        }

        .doc-chip-remove:hover {
            background: var(--primary);
            color: white;
        }

        /* ═══════════════════════════════════════════
   CHAT INPUT (NEW)
   ═══════════════════════════════════════════ */

        .chat-input {
            display: flex;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            gap: 8px;
            background: var(--bg-card);
            align-items: center;
        }

        .input-icon-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            width: 42px;
            height: 42px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .input-icon-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
        }

        .chat-input input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            outline: none;
            transition: all var(--transition-fast);
            font-family: inherit;
            height: 42px;
        }

        .chat-input input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: var(--shadow-focus);
        }

        .chat-input button:not(.input-icon-btn):not(.doc-chip-remove) {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            height: 42px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .chat-input button:not(.input-icon-btn):not(.doc-chip-remove):hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .chat-input button:not(.input-icon-btn):not(.doc-chip-remove):disabled {
            background: var(--text-light);
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
            </div>

            <div class="chat-list" id="chatList">
                <div class="empty-state">No chats yet. Start a conversation!</div>
            </div>

            <div class="sidebar-footer">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="themeIcon">🌙</span>
                    <span id="themeLabel">Dark mode</span>
                </button>
                <div class="version-text">CampusAid 🎓 v1.0</div>
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="main">
            <div class="chat-header">
                <h2>CampusAid 🎓 — ABC College</h2>
            </div>

            <div class="chat-messages" id="messages">
                <div class="message bot">
                    Hi! I'm CampusAid, your AI companion for ABC College. Ask me anything about exams, fees,
                    scholarships, hostel, or just talk to me if you're feeling stressed. I'm here for you. 💙
                </div>
            </div>

            <!-- Document attachment chip (only shows when doc is uploaded) -->
            <div id="docChip" class="doc-chip hidden">
                <span class="doc-chip-icon">📄</span>
                <span class="doc-chip-name" id="docChipName">document.pdf</span>
                <button class="doc-chip-remove" onclick="removeDocument()">✕</button>
            </div>

            <div class="chat-input">
                <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="uploadFile()">
                <button class="input-icon-btn" onclick="document.getElementById('fileInput').click()"
                    title="Attach a PDF">
                    📎
                </button>
                <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleEnter(event)">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────
        // CHAT STATE MANAGEMENT (using localStorage)
        // ─────────────────────────────────────────

        let chats = JSON.parse(localStorage.getItem("campusaid_chats") || "[]");
        let currentChatId = null;

        function saveChats() {
            localStorage.setItem("campusaid_chats", JSON.stringify(chats));
        }

        function generateId() {
            return Date.now().toString();
        }

        function getCurrentChat() {
            return chats.find(c => c.id === currentChatId);
        }

        // ─────────────────────────────────────────
        // SIDEBAR RENDERING
        // ─────────────────────────────────────────

        function renderSidebar() {
            const list = document.getElementById("chatList");

            if (chats.length === 0) {
                list.innerHTML = '<div class="empty-state">No chats yet. Start a conversation!</div>';
                return;
            }

            list.innerHTML = "";
            chats.forEach(chat => {
                const item = document.createElement("div");
                item.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
                item.innerHTML = `
                    <div class="chat-title" onclick="loadChat('${chat.id}')">${chat.title}</div>
                    <button class="delete-btn" onclick="deleteChat('${chat.id}', event)">🗑</button>
                `;
                list.appendChild(item);
            });
        }

        // ─────────────────────────────────────────
        // CHAT OPERATIONS
        // ─────────────────────────────────────────

        function createNewChat() {
            const newChat = {
                id: generateId(),
                title: "New Chat",
                messages: [],
                document: null
            };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            if (!confirm("Delete this chat?")) return;

            chats = chats.filter(c => c.id !== chatId);

            if (currentChatId === chatId) {
                currentChatId = chats.length > 0 ? chats[0].id : null;
            }

            saveChats();
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        }

        // ─────────────────────────────────────────
        // MESSAGE RENDERING
        // ─────────────────────────────────────────

        function renderMessages() {
            const messagesDiv = document.getElementById("messages");
            const chat = getCurrentChat();

            if (!chat || chat.messages.length === 0) {
                messagesDiv.innerHTML = `
        <div class="welcome-state">
            <div class="welcome-icon">🎓</div>
            <div class="welcome-title">Hey there! I'm CampusAid</div>
            <div class="welcome-subtitle">Your AI companion for college life. Ask me about exams, fees, scholarships, or just talk to me if you're stressed. I'm here for you. 💙</div>
        </div>
        <div class="suggestions-container">
            <div class="suggestions-title">Try one of these to get started:</div>
            <div class="suggestions-grid">
                <div class="suggestion-card" onclick="sendSuggestion('When is the fee deadline?')">
                    <span class="suggestion-icon">📅</span>
                    <span class="suggestion-text">When is the fee deadline?</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('How do I apply for a scholarship?')">
                    <span class="suggestion-icon">🎓</span>
                    <span class="suggestion-text">How do I apply for a scholarship?</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('What are the attendance rules?')">
                    <span class="suggestion-icon">📊</span>
                    <span class="suggestion-text">What are the attendance rules?</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('I am feeling stressed about my exams')">
                    <span class="suggestion-icon">😓</span>
                    <span class="suggestion-text">I'm stressed about my exams</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('Help me write a fee deferral letter')">
                    <span class="suggestion-icon">✍️</span>
                    <span class="suggestion-text">Help me write a fee deferral letter</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('What if I miss an internal exam due to illness?')">
                    <span class="suggestion-icon">🏥</span>
                    <span class="suggestion-text">Missed exam due to illness</span>
                </div>
            </div>
        </div>
    `;
                return;
            }

            messagesDiv.innerHTML = "";
            chat.messages.forEach(msg => {
                addMessageToDOM(
                    msg.content,
                    msg.role === "user" ? "user" : "bot",
                    msg.timestamp || null
                );
            });
        }

        function sendSuggestion(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function addMessageToDOM(text, sender, timestamp = null) {
            const messagesDiv = document.getElementById("messages");

            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper " + sender;

            const msg = document.createElement("div");
            msg.className = "message " + sender;
            msg.innerHTML = formatMessage(text);
            wrapper.appendChild(msg);

            const timeDiv = document.createElement("div");
            timeDiv.className = "message-time";
            timeDiv.textContent = timestamp || getCurrentTime();
            wrapper.appendChild(timeDiv);

            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, "0");
            const period = hours >= 12 ? "PM" : "AM";
            hours = hours % 12 || 12;
            return `${hours}:${minutes} ${period}`;
        }

        function formatMessage(text) {
            // Escape HTML to prevent injection
            text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Convert markdown to HTML
            // Bold: **text** → <strong>text</strong>
            text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

            // Italic: *text* → <em>text</em>
            text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, "<em>$1</em>");

            // Bullet points: - text → • text
            text = text.replace(/^- (.+)$/gm, "• $1");

            // Line breaks
            text = text.replace(/\n/g, "<br>");

            return text;
        }

        function showTyping() {
            const messagesDiv = document.getElementById("messages");
            const typing = document.createElement("div");
            typing.className = "message bot";
            typing.id = "typing";
            typing.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById("typing");
            if (typing) typing.remove();
        }

        // ─────────────────────────────────────────
        // SEND MESSAGE
        // ─────────────────────────────────────────

        async function sendMessage() {
            const userInput = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");
            const text = userInput.value.trim();
            if (!text) return;

            // Create new chat if none active
            if (!currentChatId) {
                createNewChat();
            }

            const chat = getCurrentChat();

            // If first message, generate AI title
            const isFirstMessage = chat.messages.length === 0;
            if (isFirstMessage) {
                chat.title = "New Chat";
                renderSidebar();
                // Generate AI title in background
                generateChatTitle(text, chat);
            }

            // Add user message
            const userTime = getCurrentTime();
            chat.messages.push({ role: "user", content: text, timestamp: userTime });
            addMessageToDOM(text, "user", userTime);
            saveChats();

            userInput.value = "";
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: text,
                        history: chat.messages.slice(0, -1),
                        document: chat.document
                    })
                });

                const data = await response.json();
                removeTyping();
                const botTime = getCurrentTime();
                addMessageToDOM(data.reply, "bot", botTime);

                // Save bot reply
                chat.messages.push({ role: "assistant", content: data.reply, timestamp: botTime });
                saveChats();
            } catch (error) {
                removeTyping();
                addMessageToDOM("Oops, something went wrong. Try again.", "bot");
            }

            sendBtn.disabled = false;
            userInput.focus();
        }
        async function generateChatTitle(firstMessage, chat) {
            try {
                const response = await fetch("/generate_title", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: firstMessage })
                });
                const data = await response.json();
                chat.title = data.title || "New Chat";
                saveChats();
                renderSidebar();
            } catch (error) {
                // Fall back to truncated message if title generation fails
                chat.title = firstMessage.length > 30 ? firstMessage.substring(0, 30) + "..." : firstMessage;
                saveChats();
                renderSidebar();
            }
        }

        function handleEnter(event) {
            if (event.key === "Enter") sendMessage();
        }

        // ─────────────────────────────────────────
        // DOCUMENT UPLOAD
        // ─────────────────────────────────────────

        async function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            if (!file) return;

            // Create new chat if none active
            if (!currentChatId) {
                createNewChat();
            }

            // Show loading state in chip
            const docChip = document.getElementById("docChip");
            const docChipName = document.getElementById("docChipName");
            docChipName.textContent = "Reading your document...";
            docChip.classList.remove("hidden");

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.status === "success") {
                    const chat = getCurrentChat();
                    chat.document = {
                        name: data.filename,
                        content: data.content
                    };
                    saveChats();

                    docChipName.textContent = data.filename;
                    docChip.classList.remove("hidden");
                    addMessageToDOM(data.message, "bot");

                    chat.messages.push({ role: "assistant", content: data.message });
                    saveChats();
                } else {
                    docChip.classList.add("hidden");
                    addMessageToDOM("⚠️ " + data.message, "bot");
                }
            } catch (error) {
                document.getElementById("docChip").classList.add("hidden");
                addMessageToDOM("Oops, couldn't upload the file. Try again.", "bot");
            }

            fileInput.value = "";
        }

        function removeDocument() {
            const chat = getCurrentChat();
            if (!chat) return;

            chat.document = null;
            saveChats();
            updateDocumentUI();
            addMessageToDOM("Document removed. We're back to general college queries.", "bot");
        }

        function updateDocumentUI() {
            const chat = getCurrentChat();
            const docChip = document.getElementById("docChip");
            const docChipName = document.getElementById("docChipName");

            if (chat && chat.document) {
                docChipName.textContent = chat.document.name;
                docChip.classList.remove("hidden");
            } else {
                docChip.classList.add("hidden");
            }
        }

        // ─────────────────────────────────────────
        // INITIALIZE ON PAGE LOAD
        // ─────────────────────────────────────────
        // ─────────────────────────────────────────
        // THEME TOGGLE
        // ─────────────────────────────────────────

        function initTheme() {
            const savedTheme = localStorage.getItem("campusaid_theme") || "light";
            applyTheme(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
            const newTheme = currentTheme === "light" ? "dark" : "light";
            applyTheme(newTheme);
            localStorage.setItem("campusaid_theme", newTheme);
        }

        function applyTheme(theme) {
            if (theme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
                document.getElementById("themeIcon").textContent = "☀️";
                document.getElementById("themeLabel").textContent = "Light mode";
            } else {
                document.documentElement.removeAttribute("data-theme");
                document.getElementById("themeIcon").textContent = "🌙";
                document.getElementById("themeLabel").textContent = "Dark mode";
            }
        }
        window.onload = async function () {
            initTheme();
            currentChatId = null;
            await loadColleges();
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        };
    </script>
</body>

</html>
