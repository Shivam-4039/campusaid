<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusAid 🎓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #1f2937;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #374151;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #374151;
        }

        .new-chat-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .new-chat-btn:hover {
            background: #1e40af;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 13px;
            color: #d1d5db;
            transition: background 0.15s;
        }

        .chat-item:hover {
            background: #374151;
        }

        .chat-item.active {
            background: #374151;
            color: white;
        }

        .chat-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .chat-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .empty-state {
            color: #6b7280;
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid #374151;
            font-size: 11px;
            color: #6b7280;
            text-align: center;
        }

        /* MAIN CHAT AREA */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            background: #2563eb;
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 18px;
        }

        .upload-area {
            padding: 8px 16px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .upload-btn {
            background: white;
            color: #2563eb;
            border: 1px solid #d1d5db;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .upload-btn:hover {
            background: #f3f4f6;
        }

        .doc-info {
            flex: 1;
            color: #6b7280;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .doc-active {
            color: #059669;
            font-weight: 500;
        }

        .remove-doc {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
        }

        .remove-doc:hover {
            background: #fee2e2;
            border-radius: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            animation: fadeInUp 0.3s ease-out;
        }

        .message.user {
            background: #2563eb;
            color: white;
        }

        .message.bot {
            background: #f1f5f9;
            color: #111;
        }

        .chat-input {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #e5e7eb;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #2563eb;
        }

        .chat-input button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-input button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .typing {
            font-style: italic;
            color: #6b7280;
            font-size: 13px;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        .message {
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-time {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
            padding: 0 8px;
        }

        .suggestions-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
        }

        .suggestions-title {
            color: #6b7280;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .suggestion-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: #374151;
        }

        .suggestion-card:hover {
            border-color: #2563eb;
            background: #f0f7ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .suggestion-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        .suggestion-text {
            flex: 1;
            line-height: 1.4;
        }

        .welcome-state {
            text-align: center;
            padding: 32px 20px 16px;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 6px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #6b7280;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
            </div>

            <div class="chat-list" id="chatList">
                <div class="empty-state">No chats yet. Start a conversation!</div>
            </div>

            <div class="sidebar-footer">
                CampusAid 🎓 v1.0
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="main">
            <div class="chat-header">
                <h2>CampusAid 🎓 — ABC College</h2>
            </div>

            <div class="upload-area">
                <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="uploadFile()">
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📎 Upload PDF</button>
                <div class="doc-info" id="docInfo">No document attached</div>
                <button class="remove-doc" id="removeBtn" onclick="removeDocument()" style="display:none">✕</button>
            </div>

            <div class="chat-messages" id="messages">
                <div class="message bot">
                    Hi! I'm CampusAid, your AI companion for ABC College. Ask me anything about exams, fees,
                    scholarships, hostel, or just talk to me if you're feeling stressed. I'm here for you. 💙
                </div>
            </div>

            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleEnter(event)">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────
        // CHAT STATE MANAGEMENT (using localStorage)
        // ─────────────────────────────────────────

        let chats = JSON.parse(localStorage.getItem("campusaid_chats") || "[]");
        let currentChatId = null;

        function saveChats() {
            localStorage.setItem("campusaid_chats", JSON.stringify(chats));
        }

        function generateId() {
            return Date.now().toString();
        }

        function getCurrentChat() {
            return chats.find(c => c.id === currentChatId);
        }

        // ─────────────────────────────────────────
        // SIDEBAR RENDERING
        // ─────────────────────────────────────────

        function renderSidebar() {
            const list = document.getElementById("chatList");

            if (chats.length === 0) {
                list.innerHTML = '<div class="empty-state">No chats yet. Start a conversation!</div>';
                return;
            }

            list.innerHTML = "";
            chats.forEach(chat => {
                const item = document.createElement("div");
                item.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
                item.innerHTML = `
                    <div class="chat-title" onclick="loadChat('${chat.id}')">${chat.title}</div>
                    <button class="delete-btn" onclick="deleteChat('${chat.id}', event)">🗑</button>
                `;
                list.appendChild(item);
            });
        }

        // ─────────────────────────────────────────
        // CHAT OPERATIONS
        // ─────────────────────────────────────────

        function createNewChat() {
            const newChat = {
                id: generateId(),
                title: "New Chat",
                messages: [],
                document: null
            };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            if (!confirm("Delete this chat?")) return;

            chats = chats.filter(c => c.id !== chatId);

            if (currentChatId === chatId) {
                currentChatId = chats.length > 0 ? chats[0].id : null;
            }

            saveChats();
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        }

        // ─────────────────────────────────────────
        // MESSAGE RENDERING
        // ─────────────────────────────────────────

        function renderMessages() {
            const messagesDiv = document.getElementById("messages");
            const chat = getCurrentChat();

            if (!chat || chat.messages.length === 0) {
                messagesDiv.innerHTML = `
        <div class="welcome-state">
            <div class="welcome-icon">🎓</div>
            <div class="welcome-title">Hey there! I'm CampusAid</div>
            <div class="welcome-subtitle">Your AI companion for college life. Ask me about exams, fees, scholarships, or just talk to me if you're stressed. I'm here for you. 💙</div>
        </div>
        <div class="suggestions-container">
            <div class="suggestions-title">Try one of these to get started:</div>
            <div class="suggestions-grid">
                <div class="suggestion-card" onclick="sendSuggestion('When is the fee deadline?')">
                    <span class="suggestion-icon">📅</span>
                    <span class="suggestion-text">When is the fee deadline?</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('How do I apply for a scholarship?')">
                    <span class="suggestion-icon">🎓</span>
                    <span class="suggestion-text">How do I apply for a scholarship?</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('What are the attendance rules?')">
                    <span class="suggestion-icon">📊</span>
                    <span class="suggestion-text">What are the attendance rules?</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('I am feeling stressed about my exams')">
                    <span class="suggestion-icon">😓</span>
                    <span class="suggestion-text">I'm stressed about my exams</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('Help me write a fee deferral letter')">
                    <span class="suggestion-icon">✍️</span>
                    <span class="suggestion-text">Help me write a fee deferral letter</span>
                </div>
                <div class="suggestion-card" onclick="sendSuggestion('What if I miss an internal exam due to illness?')">
                    <span class="suggestion-icon">🏥</span>
                    <span class="suggestion-text">Missed exam due to illness</span>
                </div>
            </div>
        </div>
    `;
                return;
            }

            messagesDiv.innerHTML = "";
            chat.messages.forEach(msg => {
                addMessageToDOM(
                    msg.content,
                    msg.role === "user" ? "user" : "bot",
                    msg.timestamp || null
                );
            });
        }

        function sendSuggestion(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function addMessageToDOM(text, sender, timestamp = null) {
            const messagesDiv = document.getElementById("messages");

            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper " + sender;

            const msg = document.createElement("div");
            msg.className = "message " + sender;
            msg.innerHTML = formatMessage(text);
            wrapper.appendChild(msg);

            const timeDiv = document.createElement("div");
            timeDiv.className = "message-time";
            timeDiv.textContent = timestamp || getCurrentTime();
            wrapper.appendChild(timeDiv);

            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, "0");
            const period = hours >= 12 ? "PM" : "AM";
            hours = hours % 12 || 12;
            return `${hours}:${minutes} ${period}`;
        }

        function formatMessage(text) {
            // Escape HTML to prevent injection
            text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Convert markdown to HTML
            // Bold: **text** → <strong>text</strong>
            text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

            // Italic: *text* → <em>text</em>
            text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, "<em>$1</em>");

            // Bullet points: - text → • text
            text = text.replace(/^- (.+)$/gm, "• $1");

            // Line breaks
            text = text.replace(/\n/g, "<br>");

            return text;
        }

        function showTyping() {
            const messagesDiv = document.getElementById("messages");
            const typing = document.createElement("div");
            typing.className = "message bot";
            typing.id = "typing";
            typing.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById("typing");
            if (typing) typing.remove();
        }

        // ─────────────────────────────────────────
        // SEND MESSAGE
        // ─────────────────────────────────────────

        async function sendMessage() {
            const userInput = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");
            const text = userInput.value.trim();
            if (!text) return;

            // Create new chat if none active
            if (!currentChatId) {
                createNewChat();
            }

            const chat = getCurrentChat();

            // If first message, generate AI title
            const isFirstMessage = chat.messages.length === 0;
            if (isFirstMessage) {
                chat.title = "New Chat";
                renderSidebar();
                // Generate AI title in background
                generateChatTitle(text, chat);
            }

            // Add user message
            const userTime = getCurrentTime();
            chat.messages.push({ role: "user", content: text, timestamp: userTime });
            addMessageToDOM(text, "user", userTime);
            saveChats();

            userInput.value = "";
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: text,
                        history: chat.messages.slice(0, -1),
                        document: chat.document
                    })
                });

                const data = await response.json();
                removeTyping();
                const botTime = getCurrentTime();
                addMessageToDOM(data.reply, "bot", botTime);

                // Save bot reply
                chat.messages.push({ role: "assistant", content: data.reply, timestamp: botTime });
                saveChats();
            } catch (error) {
                removeTyping();
                addMessageToDOM("Oops, something went wrong. Try again.", "bot");
            }

            sendBtn.disabled = false;
            userInput.focus();
        }
        async function generateChatTitle(firstMessage, chat) {
            try {
                const response = await fetch("/generate_title", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: firstMessage })
                });
                const data = await response.json();
                chat.title = data.title || "New Chat";
                saveChats();
                renderSidebar();
            } catch (error) {
                // Fall back to truncated message if title generation fails
                chat.title = firstMessage.length > 30 ? firstMessage.substring(0, 30) + "..." : firstMessage;
                saveChats();
                renderSidebar();
            }
        }

        function handleEnter(event) {
            if (event.key === "Enter") sendMessage();
        }

        // ─────────────────────────────────────────
        // DOCUMENT UPLOAD
        // ─────────────────────────────────────────

        async function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            if (!file) return;

            // Create new chat if none active
            if (!currentChatId) {
                createNewChat();
            }

            const docInfo = document.getElementById("docInfo");
            const removeBtn = document.getElementById("removeBtn");

            docInfo.textContent = "Reading your document...";
            docInfo.classList.remove("doc-active");

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.status === "success") {
                    const chat = getCurrentChat();
                    chat.document = {
                        name: data.filename,
                        content: data.content
                    };
                    saveChats();

                    docInfo.textContent = `📄 ${data.filename}`;
                    docInfo.classList.add("doc-active");
                    removeBtn.style.display = "inline";
                    addMessageToDOM(data.message, "bot");

                    chat.messages.push({ role: "assistant", content: data.message });
                    saveChats();
                } else {
                    docInfo.textContent = "No document attached";
                    addMessageToDOM("⚠️ " + data.message, "bot");
                }
            } catch (error) {
                docInfo.textContent = "No document attached";
                addMessageToDOM("Oops, couldn't upload the file. Try again.", "bot");
            }

            fileInput.value = "";
        }

        function removeDocument() {
            const chat = getCurrentChat();
            if (!chat) return;

            chat.document = null;
            saveChats();
            updateDocumentUI();
            addMessageToDOM("Document removed. We're back to general college queries.", "bot");
        }

        function updateDocumentUI() {
            const chat = getCurrentChat();
            const docInfo = document.getElementById("docInfo");
            const removeBtn = document.getElementById("removeBtn");

            if (chat && chat.document) {
                docInfo.textContent = `📄 ${chat.document.name}`;
                docInfo.classList.add("doc-active");
                removeBtn.style.display = "inline";
            } else {
                docInfo.textContent = "No document attached";
                docInfo.classList.remove("doc-active");
                removeBtn.style.display = "none";
            }
        }

        // ─────────────────────────────────────────
        // INITIALIZE ON PAGE LOAD
        // ─────────────────────────────────────────

        window.onload = function () {
            // Start fresh on page load - user clicks a chat or starts a new one
            currentChatId = null;
            renderSidebar();
            renderMessages();
            updateDocumentUI();
        };
    </script>
</body>

</html>
